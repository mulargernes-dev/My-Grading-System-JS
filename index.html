<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grading System JS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="app.js" defer></script>
</head>
<style>
    body {
        background:linear-gradient(#1ed4f8,#0d8de8,#1ed4f8);
    }
</style>


<body class="bg-dark vh-100 d-flex flex-column justify-content-center align-items-center">

    <div class="card p-4 shadow-sm" style="width: 450px;">
        <h3 class="card-title text-center mb-4">Grading Computation Engine</h3>
        
        <div class="mb-3">
            <label for="midterm-input" class="form-label">Enter Midterm Grade (0-100):</label>
            <input type="text" id="midterm-input" class="form-control" placeholder="e.g. eighty">

        <div class="mb-3">
            <label for="final-input" class="form-label">Enter Final Grade (0-100):</label>
            <input type="text" id="final-input" class="form-control" placeholder="e.g. eighty">
        </div>
        
        <button id="compute-btn" class="btn btn-success w-100 mb-4">Compute Grade</button>
        <div class="p-2 bg-white border rounded text-center" id="output-matrix">
            <p class="text-muted m-8">Awaiting system input computation...</p>
        </div>
    </div>

</body>

</html>
